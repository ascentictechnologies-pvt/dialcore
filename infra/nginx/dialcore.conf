# ============================================================
#  DialCore — Nginx site configuration
#  Domain: dialcore.ascentictechnologies.com
#
#  This file is generated/referenced by install.sh at:
#    /etc/nginx/sites-available/dialcore.conf
#
#  SSL certificates are managed by Let's Encrypt (certbot).
#  Paths are symlinks created by install.sh:
#    /etc/ascentic/dialer/ssl/dialcore.crt → /etc/letsencrypt/live/<domain>/fullchain.pem
#    /etc/ascentic/dialer/ssl/dialcore.key → /etc/letsencrypt/live/<domain>/privkey.pem
# ============================================================

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dialcore.ascentictechnologies.com;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main site ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name dialcore.ascentictechnologies.com;

    ssl_certificate     /etc/ascentic/dialer/ssl/dialcore.crt;
    ssl_certificate_key /etc/ascentic/dialer/ssl/dialcore.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    root  /opt/Ascentic/Dialer/FrontEnd;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"  always;
    add_header X-Content-Type-Options     "nosniff"     always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(self), geolocation=()" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css
        application/json application/javascript
        application/wasm image/svg+xml
        font/woff2 font/woff;

    # ── Static assets (Angular hashes filenames — long-lived cache safe) ─────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico|webp|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── REST API proxy ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass              http://unix:/run/dialcore/api.sock;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      60s;
        proxy_connect_timeout   5s;
        proxy_send_timeout      60s;
        client_max_body_size    50m;
    }

    # ── SignalR WebSocket ─────────────────────────────────────────────────────
    location /hubs/ {
        proxy_pass              http://unix:/run/dialcore/api.sock;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection "Upgrade";
        proxy_set_header        Host       $host;
        proxy_set_header        X-Real-IP  $remote_addr;
        proxy_read_timeout      86400s;
        proxy_send_timeout      86400s;
    }

    # ── Health probe (internal monitoring only) ───────────────────────────────
    location = /health {
        proxy_pass   http://unix:/run/dialcore/api.sock;
        access_log   off;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Asterisk PJSIP SIP/WSS TLS terminator (:8089) ────────────────────────────
# Browser WebRTC phones connect to: wss://dialcore.ascentictechnologies.com:8089
# Nginx terminates TLS and forwards plain WS to Asterisk PJSIP on :8090 (localhost).
# NOTE: if WebRTC phones are not used, this block can be removed.
server {
    listen      8089 ssl;
    server_name dialcore.ascentictechnologies.com;

    ssl_certificate     /etc/ascentic/dialer/ssl/dialcore.crt;
    ssl_certificate_key /etc/ascentic/dialer/ssl/dialcore.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass              http://127.0.0.1:8090;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection "Upgrade";
        proxy_set_header        Host       $host;
        proxy_read_timeout      86400s;
        proxy_send_timeout      86400s;
    }
}
