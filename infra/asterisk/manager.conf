;
; manager.conf — AMI (Asterisk Manager Interface) for DialCore
;
; AMI is OPTIONAL in DialCore: ARI remains the primary control surface for Stasis-based
; call origination and IVR. AMI is consumed as an additional event stream for richer
; correlation (queue events, peer status, raw channel lifecycle).
;
; To enable AMI server-side, mount this file at /etc/asterisk/manager.conf in your Asterisk
; container and ensure manager.so is loaded (manager => yes in modules.conf).
;
; Then set on the DialCore backend:
;   AMI_ENABLED=true
;   AMI_HOST=<asterisk-host>
;   AMI_PORT=5038
;   AMI_USERNAME=dialcore
;   AMI_SECRET=<rotate me — same value as `secret` below>
;

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0
displayconnects = yes
; Keep TLS for the next iteration when we deploy with certs in front of AMI.
; tlsenable = yes
; tlsbindaddr = 0.0.0.0:5039
; tlscertfile = /etc/asterisk/keys/asterisk.pem

[dialcore]
secret = REPLACE_ME_WITH_STRONG_SECRET
; Restrict to the container network — narrow this to the DialCore backend's IP/CIDR in production.
permit = 0.0.0.0/0
deny = 0.0.0.0/0
permit = 10.0.0.0/8
permit = 172.16.0.0/12
permit = 192.168.0.0/16
permit = 127.0.0.1/32
; Read-only event subscriptions for now; add `write =` privileges once we start sending Actions.
read = system,call,log,verbose,command,agent,user,config,dtmf,reporting,cdr,dialplan,originate
write =
