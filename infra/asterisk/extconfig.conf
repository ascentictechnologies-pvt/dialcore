;
; extconfig.conf — point Asterisk Realtime at the DialCore Postgres DB
;
; This file is INERT until ops chooses to enable Realtime. To activate:
;   1. Install this file at /etc/asterisk/extconfig.conf on the Asterisk host.
;   2. Make sure res_odbc.conf points at a working DSN (see infra/asterisk/res_odbc.conf).
;   3. Make sure sorcery.conf flips PJSIP objects to realtime (see infra/asterisk/sorcery.conf).
;   4. Run `module reload res_odbc.so res_config_odbc.so res_sorcery_realtime.so` (or restart Asterisk).
;
; Until those three steps are done, Asterisk reads pjsip.conf as today and these tables sit
; populated-but-unused — which is exactly the safe rollout shape we want.
;

[settings]
ps_endpoints           => odbc,dialcore,ps_endpoints
ps_auths               => odbc,dialcore,ps_auths
ps_aors                => odbc,dialcore,ps_aors
ps_endpoint_id_ips     => odbc,dialcore,ps_endpoint_id_ips
queue_members          => odbc,dialcore,queue_members
