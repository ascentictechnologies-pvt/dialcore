[modules]
autoload = yes

; Sorcery modules must be preloaded before res_bucket initializes.
; Without these, Asterisk 20 on Ubuntu exits with "Bucket API initialization failed".
preload = res_sorcery_config.so
preload = res_sorcery_memory.so
preload = res_sorcery_astdb.so

; res_http_media_cache triggers bucket init before sorcery is ready — disable it.
; It is only needed for streaming media from HTTP sources; not required for DialCore.
noload = res_http_media_cache.so

noload = codec_opus.so
noload = res_amd.so
noload = app_agi.so
