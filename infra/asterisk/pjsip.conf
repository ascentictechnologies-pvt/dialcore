[global]
max_initial_qualify_time=4
endpoint_identifier_order=username,ip,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-ws]
type=transport
protocol=ws
bind=127.0.0.1:8090

; WebRTC agent endpoint template — Nginx terminates WSS on :8089, forwards plain WS to :8090
[webrtc-agent](!)
type=endpoint
transport=transport-ws
context=dialcore
disallow=all
allow=ulaw,alaw
dtls_auto_generate_cert=yes
media_encryption=dtls
ice_support=yes
use_avpf=yes
force_avp=yes
media_use_received_transport=yes
rtcp_mux=yes
send_rpid=yes
rewrite_contact=yes
direct_media=no

[webrtc-agent-aor](!)
type=aor
max_contacts=3
remove_existing=yes
qualify_frequency=30

[webrtc-agent-auth](!)
type=auth
auth_type=userpass

; SIP trunk template
[pstn-trunk](!)
type=endpoint
transport=transport-udp
context=from-trunk
disallow=all
allow=ulaw,alaw
trust_id_inbound=yes
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[pstn-trunk-aor](!)
type=aor
contact=sip:REPLACE_ME_TRUNK_HOST:5060

[pstn-trunk-auth](!)
type=auth
auth_type=userpass
username=REPLACE_ME_TRUNK_USER
password=REPLACE_ME_TRUNK_PASSWORD
