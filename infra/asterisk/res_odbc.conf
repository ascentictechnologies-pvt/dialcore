;
; res_odbc.conf — ODBC DSN used by Asterisk Realtime to read DialCore's Postgres
;
; Server-side prerequisites on the Asterisk host:
;   - apt install unixodbc odbc-postgresql           (or distro equivalent)
;   - /etc/odbc.ini contains a [dialcore] section pointing at the DialCore Postgres host
;
; Example /etc/odbc.ini:
;   [dialcore]
;   Driver = PostgreSQL
;   Servername = localhost
;   Port = 5432
;   Database = dialcore
;   UserName = dialcore
;   Password = REPLACE_ME
;
; This file (res_odbc.conf) only references the DSN by name; the actual credentials live in odbc.ini.
;

[dialcore]
enabled        => yes
dsn            => dialcore
pre-connect    => yes
sanitysql      => select 1
idlecheck      => 3600
pooling        => no
limit          => 5
