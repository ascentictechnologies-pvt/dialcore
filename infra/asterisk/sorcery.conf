;
; sorcery.conf — switch PJSIP object lookups from static pjsip.conf to Realtime.
;
; This is the FINAL CUTOVER FILE. Until you mount it at /etc/asterisk/sorcery.conf and reload
; res_sorcery_realtime, Asterisk continues to use pjsip.conf only. Once mounted + reloaded,
; the four PJSIP object types below are sourced from the Realtime tables instead.
;
; Recommended rollout:
;   1. Stand up extconfig.conf + res_odbc.conf so the DSN works.
;   2. Run `POST /api/super-admin/asterisk-realtime/sync` to populate ps_endpoints / ps_auths /
;      ps_aors / ps_endpoint_id_ips.
;   3. Verify rows look correct: `psql -c "select id, transport, aors, auth from ps_endpoints"`.
;   4. Mount this sorcery.conf and run `module reload res_sorcery_realtime.so res_pjsip.so`.
;   5. Place test calls; if anything regresses, unmount sorcery.conf to revert to pjsip.conf.
;
; Static pjsip.conf templates remain in place as a fallback — Asterisk only reads them if
; sorcery is not pointed at realtime.
;

[res_pjsip]
endpoint  = realtime,ps_endpoints
auth      = realtime,ps_auths
aor       = realtime,ps_aors
identify  = realtime,ps_endpoint_id_ips
